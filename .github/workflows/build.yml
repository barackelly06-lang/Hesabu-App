
name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev wget
          pip install buildozer cython
      
      - name: Build APK
        run: buildozer android debug
        working-directory: .
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hesabu-App-APK
          path: bin/*.apk